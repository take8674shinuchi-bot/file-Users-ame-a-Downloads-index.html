# Cloudflare Workers 設定
#
# public/ ディレクトリを静的アセットとして配信する「アセットのみの Worker」。
# Worker スクリプト(main)は不要で、`wrangler deploy` で public/ をそのまま公開する。
#
# name は Cloudflare 側の Worker サービス名に一致させること
# （GitHub 連携のビルド "Workers Builds: file-users-ame-a-downloads-index" 用）。

name = "cafe-hp"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"
